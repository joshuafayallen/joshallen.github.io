
on:
  workflow_dispatch:
  push:
    branches: main
name: Gatsby Publish

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: enriikke/gatsby-gh-pages-action@v2
        with:
          access-token: GITHUB_TOKEN
          deploy-branch: gh-pages
          gatsby-args: --prefix-paths
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
