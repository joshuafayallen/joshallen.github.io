projects:
  - title: Bayesian Marketing Mix Model
    details:
      format: Blog Post
      link: https://joshuafayallen.github.io/blog/2025/nfl-marketing/
    description:
      - Adapted Marketing Mix Modeling (MMM) to quantify ROI for offensive play callers' use of personnel packages. 
      - Navigated practical identification challenges, including sparse panel data, endogenous channel usage, and left-truncated career histories. 
    tags: 
      - Python
      - R 
      - Marketing
      - Media Mixed Modeling
      - MMM
      - Bayesian Statistics
      - Pandas
      - Tidyverse
  - title: The Football Factor Model 
    details:
      format: Blog Post
      link: https://joshuafayallen.github.io/blog/2025/passing-td-factor-model/
    description: 
        - Modeled player performance based on values over replacement outcomes using Bayesian hierarchical regression using PyMC and R 
        - Translated Bayesian high-density intervals into actionable roster recommendations, producing a 5-point per game improvement in fantasy football scoring.
    tags: 
      - Python
      - R
      - Bayesian Statistics
      - Pandas
      - R 
      - Tidyverse
  - title: Football Power Rankings
    details:
      format: Full-Stack Web Application
      link: https://fantasy-football-project-psi.vercel.app/
    description:
      - Built a Bayesian Bradley-Terry model to rank NFL teams and incorporate uncertainty in estimation.
      - Designed a full-stack interactive web app using FastAPI, React, and D3.
      - Improved application scalability by transitioning from live model execution to persistent cache, reducing load time from minutes to milliseconds.


